Esta skill ajuda a preparar e revisar pull requests com foco em corretude, clareza e baixo risco de merge.

## Quando usar
Use esta skill quando a tarefa envolver:
- abrir uma pull request
- revisar mudanças antes do merge
- escrever descrição de PR
- montar checklist de revisão
- identificar riscos de regressão
- sugerir melhorias em diffs
- decidir se uma PR está pronta para aprovação

## Objetivo
Garantir que cada pull request seja compreensível, validável e segura para integração.

## Instruções
1. Entenda o objetivo da mudança antes de revisar detalhes.
2. Leia o diff junto com contexto suficiente do código adjacente.
3. Classifique achados por severidade:
   - bloqueante
   - alto risco
   - médio risco
   - sugestão
   - observação
4. Avalie:
   - corretude lógica
   - clareza
   - impacto em APIs e contratos
   - tratamento de erros
   - cobertura de testes
   - compatibilidade com comportamento existente
   - impacto em performance e segurança quando relevante
5. Ao preparar uma PR:
   - resuma objetivo em 1 frase
   - explique o que mudou
   - explique por que mudou
   - detalhe riscos e pontos para revisão
   - inclua evidência de validação

## Regras
- Não critique por preferência pessoal sem impacto técnico.
- Não aprove mudanças críticas sem verificar risco funcional.
- Não ignore casos de borda óbvios.
- Não trate ausência de teste como irrelevante quando a mudança é sensível.

## Modelo de saída
- Objetivo da PR
- Resumo das mudanças
- Pontos positivos
- Problemas encontrados
- Riscos
- Validação
- Recomendação final
