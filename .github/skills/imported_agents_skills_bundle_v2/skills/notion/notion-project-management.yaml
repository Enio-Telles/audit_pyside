Esta skill usa o Notion como base central de gestão do projeto.

O Notion deve ser tratado como o local onde estão registrados:
- os planos do projeto
- as tarefas
- os afazeres
- os itens pendentes
- o que já foi feito
- o que ainda precisa ser realizado
- os responsáveis
- os prazos
- os riscos, bloqueios e decisões

## Quando usar
Use esta skill quando a tarefa envolver:
- consultar planos do projeto no Notion
- localizar tarefas e afazeres
- identificar o que ainda falta realizar
- acompanhar progresso de execução
- consolidar backlog, pendências e prioridades
- transformar notas e páginas em plano de ação
- gerar status updates com base no que está no Notion
- revisar responsáveis, prazos e próximos passos
- organizar a execução do projeto a partir do conteúdo do Notion

## Objetivo
Usar o Notion como sistema central de acompanhamento do projeto, transformando suas páginas e bases em uma visão clara de:
- o que está planejado
- o que está em andamento
- o que está pendente
- o que já foi concluído
- quem é responsável
- o que precisa acontecer a seguir
