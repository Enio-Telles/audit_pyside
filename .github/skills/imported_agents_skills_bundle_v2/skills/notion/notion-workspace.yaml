Esta skill permite trabalhar com conteúdo do Notion de forma prática e organizada, ajudando a localizar informação, resumir páginas, consolidar conhecimento e transformar conteúdo solto em entregáveis úteis.

## Quando usar
Use esta skill quando a tarefa envolver:
- localizar páginas ou documentos no Notion
- resumir documentação, anotações ou wikis
- consolidar várias páginas em um único resumo
- transformar notas de reunião em decisões e próximos passos
- estruturar PRDs, specs, planos ou status reports
- revisar conteúdo desorganizado e propor melhor organização
- extrair tarefas, owners, prazos e dependências
- buscar contexto sobre projetos, processos ou decisões registradas no Notion
