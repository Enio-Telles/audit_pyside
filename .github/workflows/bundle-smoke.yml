name: Bundle Smoke

# Build the PyInstaller bundle and verify it starts without crashing.
# Triggered manually (expensive build) or on pushes to main.
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  bundle-smoke:
    name: PyInstaller Bundle Smoke (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Build PyInstaller bundle
        run: uv run pyinstaller audit_pyside.spec --clean --noconfirm

      - name: Verify executable exists
        run: |
          if (!(Test-Path "dist\FiscalParquetAnalyzer\FiscalParquetAnalyzer.exe")) {
            Write-Error "Executable not found after build"
            exit 1
          }
          Write-Host "Executable found: dist\FiscalParquetAnalyzer\FiscalParquetAnalyzer.exe"

      - name: Smoke test bundle
        run: |
          $output = & "dist\FiscalParquetAnalyzer\FiscalParquetAnalyzer.exe" --smoke 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Bundle smoke test failed (exit $LASTEXITCODE): $output"
            exit 1
          }
          if ($output -notmatch "smoke-ok") {
            Write-Error "Bundle smoke test did not print 'smoke-ok': $output"
            exit 1
          }
          Write-Host "Bundle smoke test passed: $output"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: FiscalParquetAnalyzer-bundle
          path: dist/FiscalParquetAnalyzer/
          retention-days: 7
        if: always()
