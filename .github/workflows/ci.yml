name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  lint:
    name: Lint and type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy transformacao
        run: uv run mypy src/transformacao

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Pytest with coverage
        # gui_smoke runs in the dedicated ubuntu smoke job to keep coverage isolated.
        # main_window_impl.py (~4500 stmts, 0%) is omitted via [tool.coverage.run].
        # Coverage ratchet: 29% after P5 merges (2026-04-25); gate at 27% (2pp headroom).
        run: >
          uv run pytest -q
          -m "not oracle and not gui and not gui_smoke"
          --cov=src
          --cov-report=xml
          --cov-report=term
          --cov-fail-under=29

      - name: Upload coverage report
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: coverage-xml
          path: coverage.xml
        if: always()

  test-gui-smoke:
    name: Test GUI Smoke (ubuntu)
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt system libraries
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1-mesa-dri libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libfontconfig1 libfreetype6

      - name: Install dependencies
        run: |
          uv sync --group dev
          uv pip install pytest-qt

      - name: Run GUI smoke test
        run: uv run pytest -q -m gui_smoke tests/ui/test_main_window_smoke.py

  test-windows:
    name: Test Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Pytest
        # gui_smoke runs in the dedicated ubuntu smoke job to avoid flaky Windows Qt headless runs.
        # No coverage on Windows to keep the job fast; coverage is collected on ubuntu.
        run: uv run pytest -q -m "not oracle and not gui and not gui_smoke"
