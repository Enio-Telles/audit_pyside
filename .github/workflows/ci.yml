name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  lint:
    name: Lint and type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy transformacao
        run: uv run mypy src/transformacao

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Pytest with coverage
        # gui_smoke requires pytest-qt + Qt system libs; runs in uv-quality.yml only.
        # Coverage ratchet: baseline was 20.37% on 2026-04-23; fail if coverage drops below 25%.
        run: >
          uv run pytest -q
          -m "not gui_smoke"
          --cov=src
          --cov-report=xml
          --cov-report=term
          --cov-fail-under=25

      - name: Upload coverage report
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: coverage-xml
          path: coverage.xml
        if: always()

  test-windows:
    name: Test Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Pytest
        # gui_smoke requires pytest-qt + Qt system libs; runs in uv-quality.yml only.
        # No coverage on Windows to keep the job fast; coverage is collected on ubuntu.
        run: uv run pytest -q -m "not oracle and not gui and not gui_smoke"
