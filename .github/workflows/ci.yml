name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Setup uv (cache enabled)
        uses: astral-sh/setup-uv@v3
        with:
          cache: true
          python-version: 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy (src/transformacao)
        run: uv run mypy src/transformacao

      - name: Import src sanity check
        run: uv run python -c "import src"

  test-linux:
    name: Tests (Linux)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv (cache enabled)
        uses: astral-sh/setup-uv@v3
        with:
          cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run pytest
        run: uv run pytest -q

  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Setup uv (cache enabled)
        uses: astral-sh/setup-uv@v3
        with:
          cache: true
          python-version: 3.11

      - name: Install dependencies
        shell: pwsh
        run: uv sync --all-extras

      - name: Run pytest (filtered)
        shell: pwsh
        run: uv run pytest -q -m "not oracle and not gui"
