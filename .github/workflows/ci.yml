name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  lint:
    name: Lint and type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy transformacao
        run: uv run mypy src/transformacao

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Pytest with coverage
        # gui_smoke runs in the dedicated ubuntu smoke job to keep coverage isolated.
        # Baseline coverage: 20% (measured 2026-04-23). Fail if coverage drops below 19%.
        run: >
          uv run pytest -q
          -m "not oracle and not gui and not gui_smoke"
          --cov=src
          --cov-report=xml
          --cov-report=term
          --cov-fail-under=19

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
        if: always()

  test-gui-smoke:
    name: Test GUI Smoke (ubuntu)
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt system libraries
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1-mesa-dri libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libfontconfig1 libfreetype6

      - name: Install dependencies
        run: |
          uv sync --group dev
          uv pip install pytest-qt

      - name: Run GUI smoke test
        run: uv run pytest -q -m gui_smoke tests/ui/test_main_window_smoke.py

  test-windows:
    name: Test Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Pytest
        # gui_smoke runs in the dedicated ubuntu smoke job to avoid flaky Windows Qt headless runs.
        # No coverage on Windows to keep the job fast; coverage is collected on ubuntu.
        run: uv run pytest -q -m "not oracle and not gui and not gui_smoke"
