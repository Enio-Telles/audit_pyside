name: Cleanup manual-map snapshots

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      base_dir:
        description: 'Base path for CNPJ folders (relative to repo or absolute). Defaults to repo `dados`.'
        required: false
        default: 'dados'
      keep_last:
        description: 'Number of latest snapshots to keep'
        required: false
        default: '10'
      keep_days:
        description: 'Age threshold in days for removing snapshots (0 means ignore age)'
        required: false
        default: '180'
      dry_run:
        description: 'If true, show what would be removed but do not delete'
        required: false
        default: 'false'

jobs:
  cleanup:
    name: Run cleanup script
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run cleanup script
        shell: bash
        run: |
          BASE_DIR="${{ github.event.inputs.base_dir || 'dados' }}"
          KEEP_LAST="${{ github.event.inputs.keep_last || '10' }}"
          KEEP_DAYS="${{ github.event.inputs.keep_days || '180' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          echo "Base dir: $BASE_DIR"
          echo "Keep last: $KEEP_LAST"
          echo "Keep days: $KEEP_DAYS"
          echo "Dry run: $DRY_RUN"
          CMD="python scripts/cleanup_snapshots.py --base \"$BASE_DIR\" --keep-last $KEEP_LAST --keep-days $KEEP_DAYS"
          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          echo "Executing: $CMD"
          # capture stdout/stderr to a report file and to the console
          eval $CMD 2>&1 | tee cleanup-report.txt

      - name: Upload cleanup report
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-report
          path: cleanup-report.txt
