name: Cleanup stale branches

on:
  schedule:
    - cron: '0 4 1 * *'  # monthly, 1st at 04:00 UTC
  workflow_dispatch:
    inputs:
      min_age_days:
        description: 'Minimum age in days before a branch is considered stale'
        required: false
        default: '30'
      merged_only:
        description: 'Only delete branches already merged into main'
        required: false
        default: 'false'
      dry_run:
        description: 'Print candidates without deleting (true = dry-run)'
        required: false
        default: 'true'

jobs:
  cleanup:
    name: Remove stale remote branches
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Fetch all remotes
        run: git fetch origin --prune

      - name: Dry-run list (always)
        run: |
          python scripts/cleanup_stale_branches.py \
            --remote origin \
            --min-age-days ${{ github.event.inputs.min_age_days || '30' }} \
            ${{ github.event.inputs.merged_only == 'true' && '--merged-only' || '' }} \
            --no-fetch

      - name: Execute deletion
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/cleanup_stale_branches.py \
            --remote origin \
            --min-age-days ${{ github.event.inputs.min_age_days || '30' }} \
            ${{ github.event.inputs.merged_only == 'true' && '--merged-only' || '' }} \
            --no-fetch \
            --execute \
            --yes
