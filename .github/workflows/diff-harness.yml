name: Differential Harness

on:
  pull_request:
    paths:
      - "src/transformacao/**"

jobs:
  diff-harness:
    name: Testes diferenciais (diff_harness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: uv sync --group dev

      - name: Rodar diff_harness
        run: uv run pytest -m diff_harness -q --tb=short

  check-readonly-label:
    name: Verificar label differential-validated para arquivos read-only
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Verificar se PR toca arquivos read-only
        id: check-readonly
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          result-encoding: string
          script: |
            const readOnlyFiles = [
              'src/transformacao/rastreabilidade_produtos/_produtos_final_impl.py',
              'src/transformacao/rastreabilidade_produtos/fatores_conversao.py',
              'src/transformacao/fatores_conversao.py',
              'src/transformacao/movimentacao_estoque.py',
              'src/transformacao/movimentacao_estoque_pkg/calculo_saldos.py',
              'src/transformacao/movimentacao_estoque_pkg/movimentacao_estoque.py',
            ];
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const changedPaths = files.map(f => f.filename);
            const touched = readOnlyFiles.filter(f => changedPaths.includes(f));
            if (touched.length > 0) {
              core.setOutput('readonly_touched', 'true');
              core.setOutput('touched_files', touched.join(', '));
            } else {
              core.setOutput('readonly_touched', 'false');
              core.setOutput('touched_files', '');
            }
            return touched.length > 0 ? 'true' : 'false';

      - name: Verificar label differential-validated
        if: steps.check-readonly.outputs.readonly_touched == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const labels = pr.labels.map(l => l.name);
            const hasLabel = labels.includes('differential-validated');
            const touchedFiles = '${{ steps.check-readonly.outputs.touched_files }}';

            if (!hasLabel) {
              core.setFailed(
                `Esta PR toca arquivos read-only (${touchedFiles}) mas nao possui o label "differential-validated".\n` +
                `Adicione o label apos executar o harness diferencial e anexar o DifferentialReport no corpo da PR.\n` +
                `Veja docs/diff-harness.md para instrucoes.`
              );
            } else {
              core.info(`Label "differential-validated" presente. Arquivos read-only: ${touchedFiles}`);
            }
