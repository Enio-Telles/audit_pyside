name: Manual Bench

on:
  workflow_dispatch:
    inputs:
      min_rounds:
        description: "Numero minimo de rounds por benchmark"
        required: false
        default: "3"
      benchmark_save:
        description: "Nome do arquivo de resultado (vazio = nao salvar)"
        required: false
        default: ""
      pr_number:
        description: "Numero da PR para comentar o relatorio (vazio = nao comentar)"
        required: false
        default: ""

jobs:
  bench:
    name: Executar benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          pip install "pytest-benchmark>=4.0" polars numpy structlog rich numba

      - name: Instalar pacote em modo editable
        run: pip install -e ".[dev]" --no-deps || pip install pytest

      - name: Executar benchmarks
        id: bench
        env:
          MIN_ROUNDS: ${{ inputs.min_rounds }}
          BENCHMARK_SAVE: ${{ inputs.benchmark_save }}
          PYTHONPATH: src
        run: |
          set -euo pipefail
          if ! [[ "$MIN_ROUNDS" =~ ^[0-9]+$ ]]; then
            echo "Invalid min_rounds"
            exit 1
          fi
          args=( --benchmark-only "--benchmark-min-rounds=$MIN_ROUNDS" --benchmark-json=bench-report.json -v )
          if [ -n "$BENCHMARK_SAVE" ]; then
            if ! [[ "$BENCHMARK_SAVE" =~ ^[a-zA-Z0-9_.-]+$ ]]; then
              echo "Invalid benchmark_save"
              exit 1
            fi
            args+=( "--benchmark-save=$BENCHMARK_SAVE" )
          fi
          pytest bench/ "${args[@]}" 2>&1 | tee bench-output.txt

      - name: Upload relatorio JSON
        uses: actions/upload-artifact@v4
        with:
          name: bench-report-${{ github.run_id }}
          path: |
            bench-report.json
            bench-output.txt
          retention-days: 30

      - name: Comentar na PR
        if: ${{ github.event.inputs.pr_number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('bench-output.txt', 'utf8');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `## Relatorio de Benchmark (run [#${context.runId}](${runUrl}))`,
              '',
              '```',
              output.slice(-3000),
              '```',
              '',
              `> Artefato completo: [bench-report-${context.runId}](${runUrl})`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ github.event.inputs.pr_number }}'),
              body: body
            });
