name: uv quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gui-smoke:
    name: GUI smoke (headless)
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install Qt system libraries
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1-mesa-dri libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libfontconfig1 libfreetype6

      - name: Install project dependencies
        run: uv sync --group dev --group test-gui

      - name: Run GUI smoke test
        run: uv run pytest -q -m gui_smoke tests/ui/test_main_window_smoke.py
