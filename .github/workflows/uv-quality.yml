name: uv quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install system libraries required by PySide6 (libEGL / OpenGL)
          sudo apt-get update && sudo apt-get install -y libegl1 libgl1-mesa-dri libxrender1 libx11-xcb1 libxcb-xinerama0 libxkbcommon0
          # Ensure a Qt binding is available for pytest-qt on the runner
          # Install light test/runtime deps needed by the GUI smoke test
          pip install polars pandas python-dotenv pytest-mock oracledb rich openpyxl pyarrow
          pip install PySide6
          pip install pytest-qt pytest-cov

      - name: Run tests (headless Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # Run only the headless GUI smoke test for this PR to avoid heavy test deps
          pytest -q --cov=src --cov-report=xml:coverage.xml tests/ui/test_main_window_smoke.py

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
